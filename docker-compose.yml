name: tasky

# ─────────────────────────────────────────────
# Reusable fragments (YAML anchors)
# ─────────────────────────────────────────────
x-node-defaults: &node-defaults
  init: true
  restart: unless-stopped
  networks: [tasky-net]
  environment: &node-env
    NODE_ENV: development
    KAFKAJS_NO_PARTITIONER_WARNING: '1'

x-kafka-deps: &kafka-deps
  mongodb:
    condition: service_healthy
  kafka:
    condition: service_healthy

x-mongo-deps: &mongo-deps
  mongodb:
    condition: service_healthy

# Healthcheck for any Node service exposing /health on its PORT.
# Uses Node itself so we don't depend on curl/wget being present in alpine images.
x-node-healthcheck: &node-healthcheck
  test:
    - CMD
    - node
    - -e
    - |
      require('http').get('http://127.0.0.1:' + process.env.PORT + '/health',
        r => process.exit(r.statusCode === 200 ? 0 : 1))
        .on('error', () => process.exit(1));
  interval: 15s
  timeout: 5s
  retries: 5
  # Generous start_period to absorb a one-shot kafkajs metadata-race crash
  # (UNKNOWN_TOPIC_OR_PARTITION on a freshly-booted broker) + auto-restart + group rejoin.
  start_period: 90s

services:
  # ─────────────────────────────────────────────
  # Apache Kafka (KRaft mode — no ZooKeeper)
  # ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: tasky-kafka
    init: true
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: '1'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: '3'
      KAFKA_DEFAULT_REPLICATION_FACTOR: '1'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD', '/opt/kafka/bin/kafka-topics.sh', '--list', '--bootstrap-server', 'localhost:9092']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [tasky-net]

  # ─────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: tasky-mongodb
    init: true
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [tasky-net]

  # ─────────────────────────────────────────────
  # Auth Service (3000)
  # ─────────────────────────────────────────────
  auth-service:
    <<: *node-defaults
    build: ./auth-service
    container_name: tasky-auth
    env_file: ./auth-service/.env
    environment:
      <<: *node-env
      PORT: '3000'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-auth'
    depends_on: *mongo-deps
    healthcheck: *node-healthcheck

  # ─────────────────────────────────────────────
  # User Service (3001)
  # ─────────────────────────────────────────────
  user-service:
    <<: *node-defaults
    build: ./user-service
    container_name: tasky-user
    env_file: ./user-service/.env
    environment:
      <<: *node-env
      PORT: '3001'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-users'
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'user-service'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  # ─────────────────────────────────────────────
  # Project Service (3002)
  # ─────────────────────────────────────────────
  project-service:
    <<: *node-defaults
    build: ./project-service
    container_name: tasky-project
    env_file: ./project-service/.env
    environment:
      <<: *node-env
      PORT: '3002'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-projects'
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'project-service'
      KAFKA_GROUP_ID: 'tasky-project-group'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  # ─────────────────────────────────────────────
  # Task Service (3003)
  # ─────────────────────────────────────────────
  task-service:
    <<: *node-defaults
    build: ./task-service
    container_name: tasky-task
    env_file: ./task-service/.env
    environment:
      <<: *node-env
      PORT: '3003'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-tasks'
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'task-service'
      KAFKA_GROUP_ID: 'tasky-task-group'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  # ─────────────────────────────────────────────
  # Tracker Service (3004)
  # ─────────────────────────────────────────────
  tracker-service:
    <<: *node-defaults
    build: ./tracker-service
    container_name: tasky-tracker
    env_file: ./tracker-service/.env
    environment:
      <<: *node-env
      PORT: '3004'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-tracker'
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'tracker-service'
      KAFKA_GROUP_ID: 'tasky-tracker-group'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  # ─────────────────────────────────────────────
  # Inbox Service (3005)
  # ─────────────────────────────────────────────
  inbox-service:
    <<: *node-defaults
    build: ./inbox-service
    container_name: tasky-inbox
    env_file: ./inbox-service/.env
    environment:
      <<: *node-env
      PORT: '3005'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-inbox'
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      PROJECT_SERVICE_URL: 'http://project-service:3002'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'inbox-service'
      KAFKA_GROUP_ID: 'tasky-inbox-group'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  # ─────────────────────────────────────────────
  # Frontend (React + Vite → static via nginx)
  # ─────────────────────────────────────────────
  frontend:
    init: true
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        # Same-origin: API calls go to /api/* and the gateway routes them
        VITE_API_BASE_URL: '/'
    container_name: tasky-frontend
    networks: [tasky-net]
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1/']
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ─────────────────────────────────────────────
  # Nginx — single entry point on host:3080
  # ─────────────────────────────────────────────
  nginx:
    init: true
    restart: unless-stopped
    build: ./nginx
    container_name: tasky-nginx
    ports:
      - '3080:80'
    depends_on:
      auth-service:    { condition: service_healthy }
      user-service:    { condition: service_healthy }
      project-service: { condition: service_healthy }
      task-service:    { condition: service_healthy }
      tracker-service: { condition: service_healthy }
      inbox-service:   { condition: service_healthy }
      frontend:        { condition: service_healthy }
    networks: [tasky-net]
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1/health/auth']
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  kafka_data:
  mongo_data:

networks:
  tasky-net:
    driver: bridge
