apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracker-service
  namespace: tasky
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracker-service
  template:
    metadata:
      labels:
        app: tracker-service
    spec:
      containers:
        - name: tracker-service
          image: ghcr.io/tasky-io/tracker-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: '3004'
            - name: NODE_ENV
              value: 'production'
            - name: AUTH_SERVICE_URL
              value: 'http://auth-service:3000'
            - name: KAFKA_BROKER
              value: 'kafka-0.kafka.tasky.svc.cluster.local:9092'
            - name: KAFKA_CLIENT_ID
              value: 'tracker-service'
            - name: KAFKA_GROUP_ID
              value: 'tasky-tracker-group'
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: tasky-secrets
                  key: MONGODB_URI_TRACKER
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tasky-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256MiapiVersion: apps/v1
