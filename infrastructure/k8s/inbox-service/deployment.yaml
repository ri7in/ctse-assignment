apiVersion: apps/v1
kind: Deployment
metadata:
  name: inbox-service
  namespace: tasky
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inbox-service
  template:
    metadata:
      labels:
        app: inbox-service
    spec:
      containers:
        - name: inbox-service
          image: ghcr.io/tasky-io/inbox-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: '3005'
            - name: NODE_ENV
              value: 'production'
            - name: AUTH_SERVICE_URL
              value: 'http://auth-service:3000'
            - name: KAFKA_BROKER
              value: 'kafka-0.kafka.tasky.svc.cluster.local:9092'
            - name: KAFKA_CLIENT_ID
              value: 'inbox-service'
            - name: KAFKA_GROUP_ID
              value: 'tasky-inbox-group'
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: tasky-secrets
                  key: MONGODB_URI_INBOX
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tasky-secrets
                  key: JWT_SECRET
            - name: FIREBASE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tasky-secrets
                  key: FIREBASE_DATABASE_URL
            - name: FIREBASE_SERVICE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: tasky-secrets
                  key: FIREBASE_SERVICE_ACCOUNT
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
