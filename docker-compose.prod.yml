name: tasky

# ─────────────────────────────────────────────
# Production compose — references prebuilt images from ECR.
# Variables (resolved at deploy time via the workflow):
#   ECR_REGISTRY                 e.g. 1234.dkr.ecr.us-east-1.amazonaws.com
#   IMAGE_TAG                    e.g. <git-sha>
#   JWT_SECRET
#   FIREBASE_DATABASE_URL
#   FIREBASE_SERVICE_ACCOUNT
# ─────────────────────────────────────────────

x-node-defaults: &node-defaults
  init: true
  restart: unless-stopped
  networks: [tasky-net]
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  environment: &node-env
    NODE_ENV: production
    KAFKAJS_NO_PARTITIONER_WARNING: '1'

x-kafka-deps: &kafka-deps
  mongodb:
    condition: service_healthy
  kafka:
    condition: service_healthy

x-node-healthcheck: &node-healthcheck
  test:
    - CMD
    - node
    - -e
    - |
      require('http').get('http://127.0.0.1:' + process.env.PORT + '/health',
        r => process.exit(r.statusCode === 200 ? 0 : 1))
        .on('error', () => process.exit(1));
  interval: 10s
  timeout: 5s
  retries: 5
  # start_interval (Docker 25+) probes every 5s during start_period so containers
  # flip to healthy as soon as they're ready, instead of waiting the full interval.
  start_interval: 5s
  # Absorbs the one-shot kafkajs metadata-race crash + auto-restart + group rejoin.
  start_period: 90s

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: tasky-kafka
    init: true
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: '1'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: '3'
      KAFKA_DEFAULT_REPLICATION_FACTOR: '1'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD', '/opt/kafka/bin/kafka-topics.sh', '--list', '--bootstrap-server', 'localhost:9092']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [tasky-net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:7
    container_name: tasky-mongodb
    init: true
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [tasky-net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    <<: *node-defaults
    image: ${ECR_REGISTRY}/tasky/auth-service:${IMAGE_TAG}
    container_name: tasky-auth
    environment:
      <<: *node-env
      PORT: '3000'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-auth'
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *node-healthcheck

  user-service:
    <<: *node-defaults
    image: ${ECR_REGISTRY}/tasky/user-service:${IMAGE_TAG}
    container_name: tasky-user
    environment:
      <<: *node-env
      PORT: '3001'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-users'
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'user-service'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  project-service:
    <<: *node-defaults
    image: ${ECR_REGISTRY}/tasky/project-service:${IMAGE_TAG}
    container_name: tasky-project
    environment:
      <<: *node-env
      PORT: '3002'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-projects'
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'project-service'
      KAFKA_GROUP_ID: 'tasky-project-group'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  task-service:
    <<: *node-defaults
    image: ${ECR_REGISTRY}/tasky/task-service:${IMAGE_TAG}
    container_name: tasky-task
    environment:
      <<: *node-env
      PORT: '3003'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-tasks'
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'task-service'
      KAFKA_GROUP_ID: 'tasky-task-group'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  tracker-service:
    <<: *node-defaults
    image: ${ECR_REGISTRY}/tasky/tracker-service:${IMAGE_TAG}
    container_name: tasky-tracker
    environment:
      <<: *node-env
      PORT: '3004'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-tracker'
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'tracker-service'
      KAFKA_GROUP_ID: 'tasky-tracker-group'
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  inbox-service:
    <<: *node-defaults
    image: ${ECR_REGISTRY}/tasky/inbox-service:${IMAGE_TAG}
    container_name: tasky-inbox
    environment:
      <<: *node-env
      PORT: '3005'
      MONGODB_URI: 'mongodb://mongodb:27017/tasktracker-inbox'
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: 'http://auth-service:3000'
      KAFKA_BROKER: 'kafka:9092'
      KAFKA_CLIENT_ID: 'inbox-service'
      KAFKA_GROUP_ID: 'tasky-inbox-group'
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT}
    depends_on: *kafka-deps
    healthcheck: *node-healthcheck

  frontend:
    init: true
    restart: unless-stopped
    image: ${ECR_REGISTRY}/tasky/frontend:${IMAGE_TAG}
    container_name: tasky-frontend
    networks: [tasky-net]
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1/']
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    init: true
    restart: unless-stopped
    image: ${ECR_REGISTRY}/tasky/nginx:${IMAGE_TAG}
    container_name: tasky-nginx
    ports:
      - '80:80'
    depends_on:
      auth-service:    { condition: service_healthy }
      user-service:    { condition: service_healthy }
      project-service: { condition: service_healthy }
      task-service:    { condition: service_healthy }
      tracker-service: { condition: service_healthy }
      inbox-service:   { condition: service_healthy }
      frontend:        { condition: service_healthy }
    networks: [tasky-net]
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1/health/auth']
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kafka_data:
  mongodb_data:

networks:
  tasky-net:
    driver: bridge
