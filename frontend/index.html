<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasky.io</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', system-ui, sans-serif; background: #EEF2F7; color: #1A1F2E; }
      a { color: #3B82F6; }
      button { cursor: pointer; padding: 6px 14px; border-radius: 4px; border: 1px solid #D1D5DB; background: #1E4D8C; color: #fff; font-size: 13px; }
      button:hover { opacity: 0.85; }
      input, textarea, select { padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 13px; }
      input:focus, textarea:focus, select:focus { outline: 2px solid #3B82F6; outline-offset: 1px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
