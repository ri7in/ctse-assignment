# SonarCloud / SonarQube monorepo config.
# Update sonar.projectKey / sonar.organization to match your SonarCloud project
# once you've imported the repo at https://sonarcloud.io/projects/create.

sonar.projectKey=ri7in_ctse-assignment
sonar.organization=ri7in
sonar.projectName=Tasky.io
sonar.projectVersion=1.0

# Source layout — point Sonar at every service's src dir + the React frontend.
sonar.sources=auth-service/src,user-service/src,project-service/src,task-service/src,tracker-service/src,inbox-service/src,frontend/src

# Test sources (Jest in /tests; Sonar treats them as tests, not duplicated code)
sonar.tests=auth-service/tests,user-service/tests,project-service/tests,task-service/tests,tracker-service/tests,inbox-service/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Don't waste analysis on dependencies, build output, generated docs, or coverage itself.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/swagger/**,**/*.config.js,**/*.config.ts

# Coverage — Jest emits lcov.info under each service's coverage/ dir.
sonar.javascript.lcov.reportPaths=auth-service/coverage/lcov.info,user-service/coverage/lcov.info,project-service/coverage/lcov.info,task-service/coverage/lcov.info,tracker-service/coverage/lcov.info,inbox-service/coverage/lcov.info

sonar.sourceEncoding=UTF-8
