name: Deploy to EC2

on:
  push:
    branches: [release-1]
  workflow_dispatch:

# Prevent overlapping deploys racing each other on the same EC2 host.
concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_REPO_PREFIX: tasky

jobs:
  # ──────────────────────────────────────────────
  # Build & push every service image to ECR (parallel)
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    strategy:
      fail-fast: true
      matrix:
        service:
          - auth-service
          - user-service
          - project-service
          - task-service
          - tracker-service
          - inbox-service
          - frontend
          - nginx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-duration-seconds: 3600

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          provenance: false
          # Same-origin SPA: API hits /api/* and the gateway routes them.
          build-args: |
            ${{ matrix.service == 'frontend' && 'VITE_API_BASE_URL=/' || '' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_REPO_PREFIX }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_REPO_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ──────────────────────────────────────────────
  # Deploy: ship checked-in compose template to EC2 and bring it up
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-duration-seconds: 3600

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render .env for deploy
        run: |
          cat > deploy.env <<EOF
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Validate compose file
        run: docker compose --env-file deploy.env -f docker-compose.prod.yml config --quiet

      - name: Copy compose + env to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml,deploy.env
          target: /home/ec2-user/tasky/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          # ECR_REGISTRY is needed before the inline aws ecr login command.
          envs: AWS_REGION
          script: |
            set -euo pipefail
            cd /home/ec2-user/tasky

            # Lock down the env file (contains secrets)
            chmod 600 deploy.env

            # Source registry from rendered env file for the login step
            ECR_REGISTRY=$(grep -E '^ECR_REGISTRY=' deploy.env | cut -d= -f2-)

            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            docker compose --env-file deploy.env -f docker-compose.prod.yml pull
            docker compose --env-file deploy.env -f docker-compose.prod.yml up -d --remove-orphans --wait --wait-timeout 300

            # Scoped cleanup — only dangling images, never touch volumes or unrelated containers.
            docker image prune -f --filter "until=24h"

            docker compose --env-file deploy.env -f docker-compose.prod.yml ps

      - name: Smoke test
        run: |
          set -euo pipefail
          for path in /health/auth /health/users /health/projects /health/tasks /health/tracker /health/inbox; do
            echo "→ ${path}"
            curl --fail --max-time 10 "http://${{ secrets.EC2_HOST }}${path}"
            echo
          done

      - name: Deployment summary
        if: success()
        run: |
          {
            echo "### ✅ Deployment Successful"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- App URL: http://${{ secrets.EC2_HOST }}"
            echo "- Time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"
