name: Deploy to EC2

on:
  push:
    branches: [release-1]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    strategy:
      matrix:
        service: [auth-service, user-service, project-service, task-service, tracker-service, inbox-service, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-duration-seconds: 3600

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          build-args: |
            ${{ matrix.service == 'frontend' && format('VITE_API_BASE_URL=http://{0}', secrets.EC2_HOST) || '' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/tasky/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/tasky/${{ matrix.service }}:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-duration-seconds: 3600

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate docker-compose file
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          cat > docker-compose.yml << 'COMPOSEFILE'
          version: '3.8'

          volumes:
            mongodb_data:
            kafka_data:

          services:
            mongodb:
              image: mongo:6
              restart: unless-stopped
              volumes:
                - mongodb_data:/data/db
              ports:
                - "27017:27017"

            kafka:
              image: confluentinc/cp-kafka:7.6.0
              restart: unless-stopped
              hostname: kafka
              ports:
                - "9092:9092"
              environment:
                KAFKA_NODE_ID: 1
                KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
                KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
                KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
                KAFKA_PROCESS_ROLES: broker,controller
                KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
                KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
                KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
                KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
                KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
                CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
              volumes:
                - kafka_data:/var/lib/kafka/data

            auth-service:
              image: ECR_REGISTRY_PLACEHOLDER/tasky/auth-service:IMAGE_TAG_PLACEHOLDER
              ports:
                - "3000:3000"
              depends_on:
                - mongodb
              environment:
                PORT: "3000"
                MONGODB_URI: "mongodb://mongodb:27017/tasktracker-auth"
                JWT_SECRET: "JWT_SECRET_PLACEHOLDER"
                NODE_ENV: production
              restart: unless-stopped

            user-service:
              image: ECR_REGISTRY_PLACEHOLDER/tasky/user-service:IMAGE_TAG_PLACEHOLDER
              ports:
                - "3001:3001"
              depends_on:
                - mongodb
                - kafka
              environment:
                PORT: "3001"
                MONGODB_URI: "mongodb://mongodb:27017/tasktracker-users"
                JWT_SECRET: "JWT_SECRET_PLACEHOLDER"
                AUTH_SERVICE_URL: "http://auth-service:3000"
                NODE_ENV: production
                KAFKA_BROKER: "kafka:9092"
                KAFKA_CLIENT_ID: user-service
              restart: unless-stopped

            project-service:
              image: ECR_REGISTRY_PLACEHOLDER/tasky/project-service:IMAGE_TAG_PLACEHOLDER
              ports:
                - "3002:3002"
              depends_on:
                - mongodb
                - kafka
              environment:
                PORT: "3002"
                MONGODB_URI: "mongodb://mongodb:27017/tasktracker-projects"
                JWT_SECRET: "JWT_SECRET_PLACEHOLDER"
                AUTH_SERVICE_URL: "http://auth-service:3000"
                NODE_ENV: production
                KAFKA_BROKER: "kafka:9092"
                KAFKA_CLIENT_ID: project-service
                KAFKA_GROUP_ID: tasky-project-group
              restart: unless-stopped

            task-service:
              image: ECR_REGISTRY_PLACEHOLDER/tasky/task-service:IMAGE_TAG_PLACEHOLDER
              ports:
                - "3003:3003"
              depends_on:
                - mongodb
                - kafka
              environment:
                PORT: "3003"
                MONGODB_URI: "mongodb://mongodb:27017/tasktracker-tasks"
                JWT_SECRET: "JWT_SECRET_PLACEHOLDER"
                AUTH_SERVICE_URL: "http://auth-service:3000"
                NODE_ENV: production
                KAFKA_BROKER: "kafka:9092"
                KAFKA_CLIENT_ID: task-service
                KAFKA_GROUP_ID: tasky-task-group
              restart: unless-stopped

            tracker-service:
              image: ECR_REGISTRY_PLACEHOLDER/tasky/tracker-service:IMAGE_TAG_PLACEHOLDER
              ports:
                - "3004:3004"
              depends_on:
                - mongodb
                - kafka
              environment:
                PORT: "3004"
                MONGODB_URI: "mongodb://mongodb:27017/tasktracker-tracker"
                JWT_SECRET: "JWT_SECRET_PLACEHOLDER"
                AUTH_SERVICE_URL: "http://auth-service:3000"
                NODE_ENV: production
                KAFKA_BROKER: "kafka:9092"
                KAFKA_CLIENT_ID: tracker-service
                KAFKA_GROUP_ID: tasky-tracker-group
              restart: unless-stopped

            inbox-service:
              image: ECR_REGISTRY_PLACEHOLDER/tasky/inbox-service:IMAGE_TAG_PLACEHOLDER
              ports:
                - "3005:3005"
              depends_on:
                - mongodb
                - kafka
              environment:
                PORT: "3005"
                MONGODB_URI: "mongodb://mongodb:27017/tasktracker-inbox"
                JWT_SECRET: "JWT_SECRET_PLACEHOLDER"
                AUTH_SERVICE_URL: "http://auth-service:3000"
                NODE_ENV: production
                KAFKA_BROKER: "kafka:9092"
                KAFKA_CLIENT_ID: inbox-service
                KAFKA_GROUP_ID: tasky-inbox-group
                FIREBASE_DATABASE_URL: "FIREBASE_DATABASE_URL_PLACEHOLDER"
                FIREBASE_SERVICE_ACCOUNT: "FIREBASE_SERVICE_ACCOUNT_PLACEHOLDER"
              restart: unless-stopped

            frontend:
              image: ECR_REGISTRY_PLACEHOLDER/tasky/frontend:IMAGE_TAG_PLACEHOLDER
              ports:
                - "80:80"
              depends_on:
                - auth-service
              environment:
                NODE_ENV: production
              restart: unless-stopped
          COMPOSEFILE

          sed -i "s|ECR_REGISTRY_PLACEHOLDER|$ECR_REGISTRY|g" docker-compose.yml
          sed -i "s|IMAGE_TAG_PLACEHOLDER|$IMAGE_TAG|g" docker-compose.yml
          sed -i "s|JWT_SECRET_PLACEHOLDER|$JWT_SECRET|g" docker-compose.yml
          sed -i "s|FIREBASE_DATABASE_URL_PLACEHOLDER|$FIREBASE_DATABASE_URL|g" docker-compose.yml
          sed -i "s|FIREBASE_SERVICE_ACCOUNT_PLACEHOLDER|$FIREBASE_SERVICE_ACCOUNT|g" docker-compose.yml
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: /home/ec2-user/

      - name: Start containers on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker-compose down
            docker system prune -f
            docker-compose pull
            docker-compose up -d
            echo "Waiting for services to start..."
            sleep 30
            docker ps

      - name: Health check
        run: |
          sleep 20
          curl --fail http://${{ secrets.EC2_HOST }} || exit 1

      - name: Deployment summary
        run: |
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- App URL: http://${{ secrets.EC2_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY