name: Deploy to AWS ECS

on:
  push:
    branches: [main, release-1, trigger-deploy]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        service: [auth-service, user-service, project-service, task-service, tracker-service, inbox-service, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/tasky/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/tasky/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install dependencies
        working-directory: infrastructure/aws
        run: npm ci

      - name: Bootstrap CDK (if needed)
        working-directory: infrastructure/aws
        run: cdk bootstrap || true

      - name: Deploy to AWS
        working-directory: infrastructure/aws
        run: cdk deploy --require-approval never

      - name: Get load balancer URL
        id: get-url
        run: |
          LB_DNS=$(aws cloudformation describe-stacks --stack-name TaskyStack --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDNS`].OutputValue' --output text)
          echo "load-balancer-url=http://$LB_DNS" >> $GITHUB_OUTPUT

      - name: Update deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.get-url.outputs.load-balancer-url }}';
            const message = url
              ? `🚀 **Deployment Successful!**\n\nYour app is live at: ${url}\n\nEnvironment: ${{ github.event.inputs.environment || 'production' }}\nCommit: ${context.sha}`
              : `🚀 **Deployment Successful!**\n\nEnvironment: ${{ github.event.inputs.environment || 'production' }}\nCommit: ${context.sha}\n\n*Load balancer URL will be available shortly...*`;

            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'Deployed to AWS ECS',
              context: 'deployment/aws-ecs',
              target_url: url || null
            });