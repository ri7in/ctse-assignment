name: Deploy to AWS ECS

on:
  push:
    branches: [release-1]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install dependencies
        working-directory: infrastructure/aws
        run: npm ci

      - name: Deploy Infrastructure
        working-directory: infrastructure/aws
        run: cdk deploy --require-approval never

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        service: [auth-service, user-service, project-service, task-service, tracker-service, inbox-service, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ needs.deploy.outputs.ecr_registry }}/tasky/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ needs.deploy.outputs.ecr_registry }}/tasky/${{ matrix.service }}:latest

  update-services:
    name: Update ECS Services
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Force new deployment on all ECS services
        run: |
          for SERVICE in auth-service user-service project-service task-service tracker-service inbox-service frontend; do
            echo "Updating $SERVICE..."
            aws ecs update-service \
              --cluster TaskyCluster \
              --service $SERVICE \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} > /dev/null
          done

      - name: Wait for services to stabilize
        run: |
          for SERVICE in auth-service user-service project-service task-service tracker-service inbox-service frontend; do
            echo "Waiting for $SERVICE to stabilize..."
            aws ecs wait services-stable \
              --cluster TaskyCluster \
              --services $SERVICE \
              --region ${{ env.AWS_REGION }}
          done

      - name: Get load balancer URL
        id: get-url
        run: |
          LB_DNS=$(aws cloudformation describe-stacks \
            --stack-name TaskyStack \
            --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDNS`].OutputValue' \
            --output text)
          echo "load-balancer-url=http://$LB_DNS" >> $GITHUB_OUTPUT

      - name: Update deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.get-url.outputs.load-balancer-url }}';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'Deployed to AWS ECS',
              context: 'deployment/aws-ecs',
              target_url: url || null
            });